<!-- React + Babel -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const{useState,useEffect,useMemo}=React;

const PARTS=[{id:"skin",zh:"皮膚",c:"#D4845A"},{id:"digestive",zh:"腸胃",c:"#2AA8A0"},{id:"head",zh:"頭部",c:"#8970CC"},{id:"joints",zh:"關節",c:"#4F8ED4"},{id:"eyes",zh:"眼睛",c:"#C8A020"},{id:"nose",zh:"鼻子",c:"#5AB0D8"},{id:"throat",zh:"喉嚨",c:"#D4547A"},{id:"heart",zh:"心臟",c:"#D44040"},{id:"custom",zh:"自訂",c:"#888888",isCustom:true}];
const SYMS={skin:["過敏","搔癢","疼痛","腫脹","起疹","乾燥","發紅","脫皮"],digestive:["噁心","嘔吐","腹瀉","便秘","脹氣","腹痛","食慾不振"],head:["頭痛","頭暈","偏頭痛","昏沉","耳鳴","注意力不集中"],joints:["疼痛","僵硬","腫脹","無力","發熱","活動受限"],eyes:["乾澀","充血","搔癢","分泌物","視力模糊","畏光"],nose:["流鼻水","鼻塞","打噴嚏","鼻血","嗅覺異常"],throat:["喉嚨痛","咳嗽","痰多","吞嚥困難","沙啞"],heart:["心悸","胸悶","胸痛","喘不過氣","心跳異常"],custom:["疲勞","發燒","寒顫","失眠","水腫","其他"]};
const WD=["日","一","二","三","四","五","六"];
const mkSet=()=>({q1Label:"吃藥",q1Color:"#3B7A57",activeParts:[],partColors:Object.fromEntries(PARTS.map(p=>[p.id,p.c])),customLabel:""});
const dk=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const fdt=iso=>{if(!iso)return"—";const d=new Date(iso);return`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;};

/* ── Loading Screen ── */
function LoadingScreen({message}){
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#F2F5F1"}}>
      <div style={{fontSize:"52px",marginBottom:"16px"}}>🌿</div>
      <div style={{color:"#9AADA4",fontSize:"15px"}}>{message||"載入中…"}</div>
    </div>
  );
}

/* ── Sign In Screen ── */
function SignInScreen({onSignIn,error}){
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#F2F5F1",padding:"32px"}}>
      <div style={{textAlign:"center",marginBottom:"48px"}}>
        <div style={{fontSize:"60px",marginBottom:"16px"}}>🌿</div>
        <h1 style={{fontSize:"26px",fontWeight:"700",color:"#2C3E35",margin:"0 0 8px"}}>健康日記</h1>
        <p style={{color:"#9AADA4",fontSize:"15px",lineHeight:"1.6"}}>每天記錄，掌握自己的身體狀況</p>
      </div>
      <button onClick={onSignIn}
        style={{display:"flex",alignItems:"center",gap:"12px",padding:"16px 28px",background:"#fff",border:"1.5px solid #E0E8E4",borderRadius:"16px",cursor:"pointer",boxShadow:"0 2px 16px rgba(0,0,0,0.08)",fontSize:"16px",fontWeight:"600",color:"#2C3E35",width:"100%",maxWidth:"320px",justifyContent:"center"}}>
        <svg width="22" height="22" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19.1 13 24 13c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.3 26.7 36 24 36c-5.2 0-9.7-3.3-11.3-8H6.3C9.7 35.7 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.3 4.1-4.1 5.5l6.2 5.2C41.4 35.2 44 30 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
        使用 Google 帳號登入
      </button>
      {error&&<p style={{color:"#D44040",fontSize:"13px",marginTop:"16px",textAlign:"center"}}>{error}</p>}
    </div>
  );
}

/* ── Record Modal ── */
function RecordModal({dateKey,record,settings,activeParts,onClose,onSave}){
  const[q1,setQ1]=useState(record?.q1||false);
  const[q1Notes,setQ1Notes]=useState(record?.q1Notes||"");
  const[parts,setParts]=useState(()=>record?.parts?JSON.parse(JSON.stringify(record.parts)):{});
  const tSym=(pid,sym)=>setParts(p=>{const prev=p[pid]?.symptoms||[];return{...p,[pid]:{...p[pid],symptoms:prev.includes(sym)?prev.filter(s=>s!==sym):[...prev,sym]}};});
  const tTrend=(pid,t)=>setParts(p=>({...p,[pid]:{...p[pid],trend:p[pid]?.trend===t?null:t}}));
  const uNotes=(pid,v)=>setParts(p=>({...p,[pid]:{...p[pid],notes:v}}));
  const[dY,dM,dD]=dateKey.split("-");
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:100,display:"flex",alignItems:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{width:"100%",background:"#F2F5F1",borderRadius:"20px 20px 0 0",maxHeight:"88vh",overflowY:"auto",paddingBottom:"32px"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"10px 0 0"}}><div style={{width:"36px",height:"4px",borderRadius:"2px",background:"#C8D4CE"}}/></div>
        <div style={{padding:"12px 20px 8px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:"20px",fontWeight:"700",color:"#2C3E35"}}>{parseInt(dY)}年 {parseInt(dM)}月{parseInt(dD)}日</div>
            <div style={{fontSize:"11px",color:"#9AADA4",marginTop:"2px",lineHeight:"1.8"}}>
              {record?.createdAt&&<div>建立：{fdt(record.createdAt)}</div>}
              {record?.updatedAt&&record.updatedAt!==record.createdAt&&<div>最後編輯：{fdt(record.updatedAt)}</div>}
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:"24px",cursor:"pointer",color:"#7A8C82",padding:0,lineHeight:1,marginTop:"4px"}}>×</button>
        </div>
        <div style={{padding:"0 14px",display:"flex",flexDirection:"column",gap:"10px"}}>
          <div style={{background:"#fff",borderRadius:"14px",padding:"14px 16px"}}>
            <div style={{fontSize:"11px",fontWeight:"700",color:"#9AADA4",letterSpacing:"1px",marginBottom:"10px"}}>Q1 主要追蹤</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:"16px",fontWeight:"600",color:"#2C3E35"}}>{settings.q1Label}</span>
              <button onClick={()=>setQ1(v=>!v)} style={{padding:"8px 24px",borderRadius:"20px",border:"none",cursor:"pointer",fontWeight:"700",fontSize:"15px",background:q1?settings.q1Color:"#EDF0EC",color:q1?"#fff":"#9AADA4"}}>{q1?"✓ 有":"無"}</button>
            </div>
            <textarea value={q1Notes} onChange={e=>setQ1Notes(e.target.value)} placeholder="備註（選填）" style={{width:"100%",marginTop:"12px",padding:"10px 12px",border:"1.5px solid #E0E8E4",borderRadius:"10px",fontSize:"14px",resize:"none",outline:"none",fontFamily:"inherit",color:"#2C3E35",background:"#FAFCFB",height:"68px"}}/>
          </div>
          {activeParts.map((part,idx)=>{
            const color=settings.partColors[part.id];
            const label=part.isCustom?(settings.customLabel||"自訂部位"):part.zh;
            const syms=SYMS[part.id]||SYMS.custom;
            const pd=parts[part.id]||{};
            return(
              <div key={part.id} style={{background:"#fff",borderRadius:"14px",padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
                  <span style={{fontSize:"11px",fontWeight:"700",color:"#9AADA4",letterSpacing:"1px"}}>Q{idx+2}</span>
                  <div style={{width:"10px",height:"10px",borderRadius:"50%",background:color,flexShrink:0}}/>
                  <span style={{fontSize:"16px",fontWeight:"700",color:"#2C3E35"}}>{label}</span>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"12px"}}>
                  {syms.map(s=>{const on=(pd.symptoms||[]).includes(s);return(<button key={s} onClick={()=>tSym(part.id,s)} style={{padding:"5px 11px",borderRadius:"14px",border:on?"none":"1.5px solid #D8E4DC",background:on?color:"transparent",color:on?"#fff":"#6B7A70",fontSize:"13px",fontWeight:on?"600":"400",cursor:"pointer"}}>{s}</button>);})}
                </div>
                <div style={{display:"flex",gap:"6px",marginBottom:"12px"}}>
                  {[{k:"better",l:"↑ 好一些",bg:"#E8F5EE",tc:"#2D7A50"},{k:"same",l:"→ 差不多",bg:"#F0F3F8",tc:"#4A6FA5"},{k:"worse",l:"↓ 差一些",bg:"#FDEAEA",tc:"#C44040"}].map(t=>(<button key={t.k} onClick={()=>tTrend(part.id,t.k)} style={{flex:1,padding:"7px 2px",borderRadius:"8px",border:"none",cursor:"pointer",fontSize:"12px",fontWeight:"600",background:pd.trend===t.k?t.bg:"#F5F7F4",color:pd.trend===t.k?t.tc:"#B0BDB7"}}>{t.l}</button>))}
                </div>
                <textarea value={pd.notes||""} onChange={e=>uNotes(part.id,e.target.value)} placeholder="備註（選填）" style={{width:"100%",padding:"10px 12px",border:"1.5px solid #E0E8E4",borderRadius:"10px",fontSize:"14px",resize:"none",outline:"none",fontFamily:"inherit",color:"#2C3E35",background:"#FAFCFB",height:"68px"}}/>
              </div>
            );
          })}
          {activeParts.length===0&&(<div style={{padding:"24px",textAlign:"center",background:"#fff",borderRadius:"14px"}}><div style={{fontSize:"28px",marginBottom:"8px"}}>⚙️</div><div style={{color:"#9AADA4",fontSize:"14px"}}>尚未設定追蹤部位</div><div style={{color:"#5A8C70",fontSize:"13px",marginTop:"4px",fontWeight:"600"}}>請到「設定」頁面選擇 →</div></div>)}
          <button onClick={()=>onSave(dateKey,q1,q1Notes,parts)} style={{width:"100%",padding:"16px",background:"#3B7A57",border:"none",borderRadius:"14px",color:"#fff",fontSize:"16px",fontWeight:"700",cursor:"pointer",marginTop:"4px"}}>儲存記錄</button>
        </div>
      </div>
    </div>
  );
}

/* ── Settings Content ── */
function SettingsContent({settings,onUpdate,user,onSignOut,onExport,onImport}){
  const toggle=id=>{const a=settings.activeParts;if(a.includes(id))onUpdate({...settings,activeParts:a.filter(x=>x!==id)});else if(a.length<5)onUpdate({...settings,activeParts:[...a,id]});};
  return(
    <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:"14px",paddingBottom:"80px"}}>
      {/* Account */}
      <div>
        <div style={{fontSize:"11px",fontWeight:"700",color:"#9AADA4",letterSpacing:"1px",marginBottom:"8px"}}>我的帳號</div>
        <div style={{background:"#fff",borderRadius:"14px",padding:"16px",display:"flex",alignItems:"center",gap:"12px"}}>
          {user.photoURL
            ?<img src={user.photoURL} width="44" height="44" style={{borderRadius:"50%",flexShrink:0}} alt=""/>
            :<div style={{width:"44px",height:"44px",borderRadius:"50%",background:"#3B7A57",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:"700",fontSize:"18px",flexShrink:0}}>{(user.displayName||"U")[0]}</div>
          }
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:"15px",fontWeight:"600",color:"#2C3E35",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.displayName||"使用者"}</div>
            <div style={{fontSize:"12px",color:"#9AADA4",marginTop:"2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</div>
          </div>
          <button onClick={onSignOut} style={{padding:"7px 14px",borderRadius:"10px",border:"1.5px solid #E0E8E4",background:"transparent",fontSize:"13px",color:"#7A8C82",cursor:"pointer",flexShrink:0,fontWeight:"600"}}>登出</button>
        </div>
      </div>

      {/* Q1 */}
      <div>
        <div style={{fontSize:"11px",fontWeight:"700",color:"#9AADA4",letterSpacing:"1px",marginBottom:"8px"}}>Q1 主要追蹤項目</div>
        <div style={{background:"#fff",borderRadius:"14px",padding:"14px 16px"}}>
          <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
            <input value={settings.q1Label} onChange={e=>onUpdate({...settings,q1Label:e.target.value})} placeholder="例：吃藥、量血壓…" style={{flex:1,padding:"10px 12px",border:"1.5px solid #D8E4DC",borderRadius:"10px",fontSize:"15px",outline:"none",color:"#2C3E35"}}/>
            <div style={{position:"relative",flexShrink:0}}>
              <input type="color" value={settings.q1Color} onChange={e=>onUpdate({...settings,q1Color:e.target.value})} style={{opacity:0,position:"absolute",inset:0,width:"100%",height:"100%",cursor:"pointer"}}/>
              <div style={{width:"42px",height:"42px",borderRadius:"10px",background:settings.q1Color,border:"2px solid #E0E8E4"}}/>
            </div>
          </div>
        </div>
      </div>

      {/* Body parts */}
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
          <div style={{fontSize:"11px",fontWeight:"700",color:"#9AADA4",letterSpacing:"1px"}}>追蹤部位（最多 5 個）</div>
          <div style={{fontSize:"12px",fontWeight:"700",color:settings.activeParts.length>=5?"#D44040":"#9AADA4"}}>{settings.activeParts.length}/5</div>
        </div>
        <div style={{background:"#fff",borderRadius:"14px",padding:"4px 16px"}}>
          {PARTS.map((part,i)=>{
            const active=settings.activeParts.includes(part.id);const color=settings.partColors[part.id];
            return(<div key={part.id} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 0",borderBottom:i<PARTS.length-1?"1px solid #F0F5F2":"none"}}>
              <button onClick={()=>toggle(part.id)} style={{width:"26px",height:"26px",borderRadius:"50%",flexShrink:0,cursor:"pointer",border:active?"none":"2px solid #D0DAD4",background:active?color:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{active&&<span style={{color:"#fff",fontSize:"11px",fontWeight:"700"}}>✓</span>}</button>
              <div style={{flex:1,minWidth:0}}>{part.isCustom?<input value={settings.customLabel} onChange={e=>onUpdate({...settings,customLabel:e.target.value})} placeholder="自訂部位名稱…" style={{border:"none",outline:"none",fontSize:"15px",color:active?"#2C3E35":"#9AADA4",background:"transparent",width:"100%"}}/>:<span style={{fontSize:"15px",color:active?"#2C3E35":"#9AADA4",fontWeight:active?"500":"400"}}>{part.zh}</span>}</div>
              <div style={{position:"relative",flexShrink:0}}><input type="color" value={color} onChange={e=>onUpdate({...settings,partColors:{...settings.partColors,[part.id]:e.target.value}})} style={{opacity:0,position:"absolute",inset:0,width:"100%",height:"100%",cursor:"pointer"}}/><div style={{width:"28px",height:"28px",borderRadius:"8px",background:color,border:"1.5px solid #E0E8E4"}}/></div>
            </div>);
          })}
        </div>
      </div>

      {/* Data management */}
      <div>
        <div style={{fontSize:"11px",fontWeight:"700",color:"#9AADA4",letterSpacing:"1px",marginBottom:"8px"}}>資料管理</div>
        <div style={{background:"#fff",borderRadius:"14px",overflow:"hidden"}}>
          <button onClick={onExport} style={{width:"100%",padding:"14px 16px",border:"none",background:"transparent",textAlign:"left",cursor:"pointer",borderBottom:"1px solid #F0F5F2",display:"flex",alignItems:"center",gap:"10px"}}>
            <span style={{fontSize:"18px"}}>📤</span>
            <div><div style={{fontSize:"15px",color:"#2C3E35",fontWeight:"500"}}>匯出資料</div><div style={{fontSize:"12px",color:"#9AADA4",marginTop:"1px"}}>下載備份檔案</div></div>
          </button>
          <button onClick={onImport} style={{width:"100%",padding:"14px 16px",border:"none",background:"transparent",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px"}}>
            <span style={{fontSize:"18px"}}>📥</span>
            <div><div style={{fontSize:"15px",color:"#2C3E35",fontWeight:"500"}}>匯入資料</div><div style={{fontSize:"12px",color:"#9AADA4",marginTop:"1px"}}>從備份還原資料</div></div>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Main App ── */
function App(){
  const[user,setUser]=useState(undefined); // undefined = still checking
  const[pData,setPData]=useState({settings:mkSet(),records:{}});
  const[dataLoading,setDataLoading]=useState(false);
  const[signInError,setSignInError]=useState("");
  const[screen,setScreen]=useState("calendar");
  const[month,setMonth]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()};});
  const[selDate,setSelDate]=useState(null);
  const[filter,setFilter]=useState(null);
  const[toast,setToast]=useState("");
  const[showPicker,setShowPicker]=useState(false);
  const[pickerYear,setPickerYear]=useState(month.y);
  const[showExport,setShowExport]=useState(false);
  const[showImport,setShowImport]=useState(false);
  const[importText,setImportText]=useState("");
  const[saving,setSaving]=useState(false);

  const settings=pData.settings||mkSet();
  const records=pData.records||{};

  // Auth state listener
  useEffect(()=>{
    return auth.onAuthStateChanged(async u=>{
      if(u){
        setDataLoading(true);
        try{
          const doc=await db.collection("users").doc(u.uid).get();
          if(doc.exists){setPData(doc.data());}
          else{
            const def={settings:mkSet(),records:{}};
            await db.collection("users").doc(u.uid).set(def);
            setPData(def);
          }
        }catch(e){console.error(e);}
        setDataLoading(false);
      }
      setUser(u||null);
    });
  },[]);

  const saveToDb=async(newData)=>{
    if(!user)return;
    setSaving(true);
    try{await db.collection("users").doc(user.uid).set(newData);}
    catch(e){showToast("儲存失敗，請檢查網路");}
    setSaving(false);
  };

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  const handleSignIn=async()=>{
    setSignInError("");
    try{await auth.signInWithPopup(googleProvider);}
    catch(e){
      if(e.code==="auth/popup-blocked"){
        try{await auth.signInWithRedirect(googleProvider);}
        catch(e2){setSignInError("登入失敗，請再試一次");}
      }else if(e.code!=="auth/popup-closed-by-user"){
        setSignInError("登入失敗，請再試一次");
      }
    }
  };

  const handleSignOut=async()=>{
    await auth.signOut();
    setPData({settings:mkSet(),records:{}});
    setScreen("calendar");setFilter(null);setSelDate(null);
  };

  const updateSettings=s=>{
    const newData={...pData,settings:s};
    setPData(newData);saveToDb(newData);
  };

  const saveRecord=(dateKey,q1Val,q1NotesVal,partsVal)=>{
    const old=pData.records[dateKey];const now=new Date().toISOString();
    const newData={...pData,records:{...pData.records,[dateKey]:{createdAt:old?.createdAt||now,updatedAt:now,q1:q1Val,q1Notes:q1NotesVal,parts:partsVal}}};
    setPData(newData);saveToDb(newData);
    setSelDate(null);showToast("已儲存 ✓");
  };

  const getExportJson=()=>JSON.stringify({version:1,exportedAt:new Date().toISOString(),settings,records},null,2);
  const importData=()=>{
    try{
      const parsed=JSON.parse(importText);
      if(parsed.settings&&parsed.records){
        const newData={settings:parsed.settings,records:parsed.records};
        setPData(newData);saveToDb(newData);
        setShowImport(false);setImportText("");showToast("匯入成功 ✓");
      }else{showToast("格式錯誤，請確認內容");}
    }catch{showToast("格式錯誤，請確認內容");}
  };

  const activeParts=useMemo(()=>settings.activeParts.map(id=>PARTS.find(p=>p.id===id)).filter(Boolean),[settings.activeParts]);
  const getTagsForDay=key=>{const rec=records[key];if(!rec)return[];const tags=[];if(rec.q1)tags.push({id:"q1",color:settings.q1Color});activeParts.forEach(p=>{const pd=rec.parts?.[p.id];if(pd?.symptoms?.length||pd?.notes?.trim())tags.push({id:p.id,color:settings.partColors[p.id]});});return tags;};
  const isFiltered=key=>{if(!filter)return true;const rec=records[key];if(!rec)return false;if(filter==="q1")return!!rec.q1;const pd=rec.parts?.[filter];return!!(pd?.symptoms?.length||pd?.notes?.trim());};

  // Still checking auth
  if(user===undefined||dataLoading) return <LoadingScreen message={dataLoading?"讀取資料中…":"載入中…"}/>;

  // Not signed in
  if(!user) return <SignInScreen onSignIn={handleSignIn} error={signInError}/>;

  const todayK=dk(new Date());
  const firstDay=new Date(month.y,month.m,1).getDay();
  const daysInMonth=new Date(month.y,month.m+1,0).getDate();

  return(
    <div style={{minHeight:"100vh",paddingTop:"110px",paddingBottom:"72px",background:"#F2F5F1"}}>

      {/* Fixed Header */}
      <div style={{position:"fixed",top:0,left:0,right:0,background:"#fff",padding:"14px 16px 10px",borderBottom:"1px solid #E5EDE7",zIndex:50}}>
        {screen==="calendar"&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              {user.photoURL
                ?<img src={user.photoURL} width="32" height="32" style={{borderRadius:"50%",cursor:"pointer",flexShrink:0}} onClick={()=>setScreen("settings")} alt=""/>
                :<div onClick={()=>setScreen("settings")} style={{width:"32px",height:"32px",borderRadius:"50%",background:"#3B7A57",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:"700",fontSize:"14px",cursor:"pointer",flexShrink:0}}>{(user.displayName||"U")[0]}</div>
              }
              <div style={{display:"flex",alignItems:"center"}}>
                <button onClick={()=>setMonth(m=>{const d=new Date(m.y,m.m-1);return{y:d.getFullYear(),m:d.getMonth()};})} style={{background:"none",border:"none",cursor:"pointer",fontSize:"22px",color:"#7A8C82",padding:"0 4px",lineHeight:1}}>‹</button>
                <span onClick={()=>{setPickerYear(month.y);setShowPicker(true);}} style={{fontSize:"17px",fontWeight:"700",color:"#2C3E35",minWidth:"100px",textAlign:"center",cursor:"pointer",userSelect:"none"}}>{month.y}年 {month.m+1}月</span>
                <button onClick={()=>setMonth(m=>{const d=new Date(m.y,m.m+1);return{y:d.getFullYear(),m:d.getMonth()};})} style={{background:"none",border:"none",cursor:"pointer",fontSize:"22px",color:"#7A8C82",padding:"0 4px",lineHeight:1}}>›</button>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              {saving&&<div style={{fontSize:"11px",color:"#9AADA4"}}>同步中…</div>}
              <button onClick={()=>{const n=new Date();setMonth({y:n.getFullYear(),m:n.getMonth()});setSelDate(dk(n));}} style={{padding:"5px 12px",background:"#3B7A57",border:"none",borderRadius:"16px",color:"#fff",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>今天</button>
            </div>
          </div>
          <div style={{display:"flex",gap:"6px",overflowX:"auto",paddingBottom:"2px"}}>
            {[{id:null,label:"全部",color:null},{id:"q1",label:settings.q1Label,color:settings.q1Color},...activeParts.map(p=>({id:p.id,label:p.isCustom?(settings.customLabel||"自訂"):p.zh,color:settings.partColors[p.id]}))].map(f=>(<button key={String(f.id)} onClick={()=>setFilter(filter===f.id?null:f.id)} style={{padding:"4px 12px",borderRadius:"16px",border:"none",flexShrink:0,cursor:"pointer",fontSize:"12px",fontWeight:"600",whiteSpace:"nowrap",background:filter===f.id?(f.color||"#2C3E35"):"#F0F5F2",color:filter===f.id?"#fff":"#7A8C82"}}>{f.label}</button>))}
          </div>
        </>)}
        {screen==="settings"&&(
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <button onClick={()=>setScreen("calendar")} style={{background:"none",border:"none",cursor:"pointer",fontSize:"22px",color:"#7A8C82",padding:"0 4px",lineHeight:1}}>‹</button>
            <span style={{fontSize:"17px",fontWeight:"700",color:"#2C3E35"}}>設定</span>
          </div>
        )}
      </div>

      {/* Calendar */}
      {screen==="calendar"&&(
        <div style={{padding:"12px 10px 0"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:"4px"}}>{WD.map((d,i)=>(<div key={d} style={{textAlign:"center",fontSize:"12px",fontWeight:"600",padding:"4px 0",color:i===0?"#D44040":i===6?"#4A87C8":"#9AADA4"}}>{d}</div>))}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px"}}>
            {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}/>)}
            {Array.from({length:daysInMonth}).map((_,i)=>{
              const day=i+1;
              const dateKey=`${month.y}-${String(month.m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const isToday=dateKey===todayK;const isPast=dateKey<todayK;
              const rec=records[dateKey];const tags=getTagsForDay(dateKey);
              const dimmed=!!filter&&!isFiltered(dateKey);const noRecord=!rec&&isPast;
              return(<button key={day} onClick={()=>setSelDate(dateKey)} style={{aspectRatio:"1",borderRadius:"10px",cursor:"pointer",border:noRecord?"1.5px dashed #C8D4CE":"none",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"3px",padding:"2px",background:isToday?"#EAF5EE":"transparent",outline:isToday?"2px solid #3B7A57":"none",outlineOffset:"1px",opacity:dimmed?0.2:1}}>
                <span style={{fontSize:"14px",fontWeight:isToday?"800":"400",lineHeight:1,color:noRecord?"#C8D4CE":isToday?"#3B7A57":"#2C3E35"}}>{day}</span>
                <div style={{display:"flex",gap:"3px",flexWrap:"wrap",justifyContent:"center",minHeight:"10px"}}>{tags.slice(0,5).map(t=>(<div key={t.id} style={{width:"8px",height:"8px",borderRadius:"50%",background:t.color}}/>))}</div>
              </button>);
            })}
          </div>
          <div style={{marginTop:"14px",padding:"12px 14px",background:"#fff",borderRadius:"14px",marginBottom:"16px"}}>
            <div style={{fontSize:"11px",fontWeight:"700",color:"#9AADA4",letterSpacing:"1px",marginBottom:"8px"}}>圖例</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"10px 14px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"5px"}}><div style={{width:"9px",height:"9px",borderRadius:"50%",background:settings.q1Color}}/><span style={{fontSize:"12px",color:"#6B7A70"}}>{settings.q1Label}</span></div>
              {activeParts.map(p=>(<div key={p.id} style={{display:"flex",alignItems:"center",gap:"5px"}}><div style={{width:"9px",height:"9px",borderRadius:"50%",background:settings.partColors[p.id]}}/><span style={{fontSize:"12px",color:"#6B7A70"}}>{p.isCustom?(settings.customLabel||"自訂"):p.zh}</span></div>))}
              <div style={{display:"flex",alignItems:"center",gap:"5px"}}><div style={{width:"12px",height:"9px",borderRadius:"2px",border:"1.5px dashed #C8D4CE"}}/><span style={{fontSize:"12px",color:"#B0BDB7"}}>未記錄</span></div>
            </div>
          </div>
        </div>
      )}

      {/* Settings */}
      {screen==="settings"&&(<SettingsContent settings={settings} onUpdate={updateSettings} user={user} onSignOut={handleSignOut} onExport={()=>setShowExport(true)} onImport={()=>setShowImport(true)}/>)}

      {/* Fixed Bottom Tabs */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",display:"flex",borderTop:"1px solid #E5EDE7",zIndex:50}}>
        {[{id:"calendar",label:"日曆",icon:"📅"},{id:"settings",label:"設定",icon:"⚙️"}].map(tab=>(<button key={tab.id} onClick={()=>setScreen(tab.id)} style={{flex:1,padding:"12px 0 10px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}}><span style={{fontSize:"20px",lineHeight:1}}>{tab.icon}</span><span style={{fontSize:"11px",fontWeight:screen===tab.id?"700":"400",color:screen===tab.id?"#3B7A57":"#9AADA4"}}>{tab.label}</span></button>))}
      </div>

      {/* Record Modal */}
      {selDate&&(<RecordModal dateKey={selDate} record={records[selDate]} settings={settings} activeParts={activeParts} onClose={()=>setSelDate(null)} onSave={saveRecord}/>)}

      {/* Export Modal */}
      {showExport&&(()=>{const json=getExportJson();return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:150,display:"flex",alignItems:"flex-end"}}>
          <div style={{width:"100%",background:"#F2F5F1",borderRadius:"20px 20px 0 0",padding:"20px 16px 40px",display:"flex",flexDirection:"column",maxHeight:"80vh"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
              <span style={{fontSize:"17px",fontWeight:"700",color:"#2C3E35"}}>匯出資料</span>
              <button onClick={()=>setShowExport(false)} style={{background:"none",border:"none",fontSize:"22px",cursor:"pointer",color:"#7A8C82",padding:0}}>×</button>
            </div>
            <p style={{fontSize:"13px",color:"#9AADA4",marginBottom:"12px",lineHeight:"1.6"}}>複製以下文字保存到備忘錄，或傳給自己做為備份。</p>
            <textarea readOnly value={json} onFocus={e=>e.target.select()} style={{flex:1,minHeight:"160px",padding:"10px 12px",border:"1.5px solid #E0E8E4",borderRadius:"10px",fontSize:"11px",fontFamily:"monospace",resize:"none",outline:"none",color:"#2C3E35",background:"#FAFCFB"}}/>
            <button onClick={()=>{navigator.clipboard?.writeText(json).then(()=>{setShowExport(false);showToast("已複製到剪貼簿 ✓");}).catch(()=>{});}} style={{marginTop:"12px",width:"100%",padding:"15px",background:"#3B7A57",border:"none",borderRadius:"12px",color:"#fff",fontSize:"15px",fontWeight:"700",cursor:"pointer"}}>複製到剪貼簿</button>
          </div>
        </div>
      );})()}

      {/* Import Modal */}
      {showImport&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:150,display:"flex",alignItems:"flex-end"}}>
          <div style={{width:"100%",background:"#F2F5F1",borderRadius:"20px 20px 0 0",padding:"20px 16px 40px",display:"flex",flexDirection:"column",maxHeight:"80vh"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
              <span style={{fontSize:"17px",fontWeight:"700",color:"#2C3E35"}}>匯入資料</span>
              <button onClick={()=>{setShowImport(false);setImportText("");}} style={{background:"none",border:"none",fontSize:"22px",cursor:"pointer",color:"#7A8C82",padding:0}}>×</button>
            </div>
            <p style={{fontSize:"13px",color:"#E07A50",marginBottom:"12px",lineHeight:"1.6"}}>⚠️ 匯入後會覆蓋目前所有資料，請先確認已備份。</p>
            <textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder="將匯出的文字貼在這裡…" style={{flex:1,minHeight:"160px",padding:"10px 12px",border:"1.5px solid #E0E8E4",borderRadius:"10px",fontSize:"11px",fontFamily:"monospace",resize:"none",outline:"none",color:"#2C3E35",background:"#FAFCFB"}}/>
            <button onClick={importData} disabled={!importText.trim()} style={{marginTop:"12px",width:"100%",padding:"15px",background:importText.trim()?"#3B7A57":"#C8D4CE",border:"none",borderRadius:"12px",color:"#fff",fontSize:"15px",fontWeight:"700",cursor:importText.trim()?"pointer":"default"}}>匯入</button>
          </div>
        </div>
      )}

      {/* Month Picker */}
      {showPicker&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",zIndex:90,display:"flex",alignItems:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget)setShowPicker(false);}}>
          <div style={{width:"100%",background:"#F2F5F1",borderRadius:"20px 20px 0 0",padding:"16px 16px 40px"}}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:"14px"}}><div style={{width:"36px",height:"4px",borderRadius:"2px",background:"#C8D4CE"}}/></div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px",padding:"0 8px"}}>
              <button onClick={()=>setPickerYear(y=>y-1)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"24px",color:"#7A8C82",padding:"4px 12px",lineHeight:1}}>‹</button>
              <span style={{fontSize:"20px",fontWeight:"700",color:"#2C3E35"}}>{pickerYear}年</span>
              <button onClick={()=>setPickerYear(y=>y+1)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"24px",color:"#7A8C82",padding:"4px 12px",lineHeight:1}}>›</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px",marginBottom:"14px"}}>
              {Array.from({length:12}).map((_,i)=>{const isSel=month.y===pickerYear&&month.m===i;return(<button key={i} onClick={()=>{setMonth({y:pickerYear,m:i});setShowPicker(false);}} style={{padding:"13px 4px",borderRadius:"12px",border:"none",cursor:"pointer",fontSize:"15px",fontWeight:isSel?"700":"400",background:isSel?"#3B7A57":"#fff",color:isSel?"#fff":"#2C3E35"}}>{i+1}月</button>);})}
            </div>
            <button onClick={()=>setShowPicker(false)} style={{width:"100%",padding:"13px",background:"#EDF0EC",border:"none",borderRadius:"12px",cursor:"pointer",fontSize:"15px",color:"#7A8C82",fontWeight:"600"}}>取消</button>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast&&(<div style={{position:"fixed",top:"20px",left:"50%",transform:"translateX(-50%)",background:"#2C3E35",color:"#fff",padding:"10px 20px",borderRadius:"20px",fontSize:"14px",fontWeight:"600",zIndex:200,pointerEvents:"none"}}>{toast}</div>)}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
