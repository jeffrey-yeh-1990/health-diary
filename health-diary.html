<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="健康日記">
<title>健康日記</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#F2F5F1;overscroll-behavior:none}
::-webkit-scrollbar{display:none}
input,textarea,button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;

const PARTS=[
  {id:"skin",zh:"皮膚",c:"#D4845A"},
  {id:"digestive",zh:"腸胃",c:"#2AA8A0"},
  {id:"head",zh:"頭部",c:"#8970CC"},
  {id:"joints",zh:"關節",c:"#4F8ED4"},
  {id:"eyes",zh:"眼睛",c:"#C8A020"},
  {id:"nose",zh:"鼻子",c:"#5AB0D8"},
  {id:"throat",zh:"喉嚨",c:"#D4547A"},
  {id:"heart",zh:"心臟",c:"#D44040"},
  {id:"custom",zh:"自訂",c:"#888888",isCustom:true},
];
const SYMS={
  skin:["過敏","搔癢","疼痛","腫脹","起疹","乾燥","發紅","脫皮"],
  digestive:["噁心","嘔吐","腹瀉","便秘","脹氣","腹痛","食慾不振"],
  head:["頭痛","頭暈","偏頭痛","昏沉","耳鳴","注意力不集中"],
  joints:["疼痛","僵硬","腫脹","無力","發熱","活動受限"],
  eyes:["乾澀","充血","搔癢","分泌物","視力模糊","畏光"],
  nose:["流鼻水","鼻塞","打噴嚏","鼻血","嗅覺異常"],
  throat:["喉嚨痛","咳嗽","痰多","吞嚥困難","沙啞"],
  heart:["心悸","胸悶","胸痛","喘不過氣","心跳異常"],
  custom:["疲勞","發燒","寒顫","失眠","水腫","其他"],
};
const WD=["日","一","二","三","四","五","六"];
const AC=["#3B7A57","#5A8FD4","#D4845A","#8970CC","#D4547A","#2AA8A0","#D44040","#C8A020"];
const LS={
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};
const mkSet=()=>({
  q1Label:"吃藥",q1Color:"#3B7A57",
  activeParts:[],
  partColors:Object.fromEntries(PARTS.map(p=>[p.id,p.c])),
  customLabel:"",
});
const dk=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const fdt=iso=>{if(!iso)return"—";const d=new Date(iso);return`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;};
const uid=()=>Math.random().toString(36).slice(2,10);

function RecordModal({dateKey,record,settings,activeParts,onClose,onSave}){
  const[q1,setQ1]=useState(record?.q1||false);
  const[q1Notes,setQ1Notes]=useState(record?.q1Notes||"");
  const[parts,setParts]=useState(()=>record?.parts?JSON.parse(JSON.stringify(record.parts)):{});
  const tSym=(pid,sym)=>setParts(p=>{const prev=p[pid]?.symptoms||[];return{...p,[pid]:{...p[pid],symptoms:prev.includes(sym)?prev.filter(s=>s!==sym):[...prev,sym]}};});
  const tTrend=(pid,t)=>setParts(p=>({...p,[pid]:{...p[pid],trend:p[pid]?.trend===t?null:t}}));
  const uNotes=(pid,v)=>setParts(p=>({...p,[pid]:{...p[pid],notes:v}}));
  const[dY,dM,dD]=dateKey.split("-");
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:100,display:"flex",alignItems:"flex-end"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{width:"100%",background:"#F2F5F1",borderRadius:"20px 20px 0 0",maxHeight:"88vh",overflowY:"auto",paddingBottom:"32px"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"10px 0 0"}}>
          <div style={{width:"36px",height:"4px",borderRadius:"2px",background:"#C8D4CE"}}/>
        </div>
        <div style={{padding:"12px 20px 8px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:"20px",fontWeight:"700",color:"#2C3E35"}}>{parseInt(dY)}年 {parseInt(dM)}月{parseInt(dD)}日</div>
            <div style={{fontSize:"11px",color:"#9AADA4",marginTop:"2px",lineHeight:"1.8"}}>
              {record?.createdAt&&<div>建立：{fdt(record.createdAt)}</div>}
              {record?.updatedAt&&record.updatedAt!==record.createdAt&&<div>最後編輯：{fdt(record.updatedAt)}</div>}
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:"24px",cursor:"pointer",color:"#7A8C82",padding:0,lineHeight:1,marginTop:"4px"}}>×</button>
        </div>
        <div style={{padding:"0 14px",display:"flex",flexDirection:"column",gap:"10px"}}>
          <div style={{background:"#fff",borderRadius:"14px",padding:"14px 16px"}}>
            <div style={{fontSize:"11px",fontWeight:"700",color:"#9AADA4",letterSpacing:"1px",marginBottom:"10px"}}>Q1 主要追蹤</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:"16px",fontWeight:"600",color:"#2C3E35"}}>{settings.q1Label}</span>
              <button onClick={()=>setQ1(v=>!v)}
                style={{padding:"8px 24px",borderRadius:"20px",border:"none",cursor:"pointer",fontWeight:"700",fontSize:"15px",
                  background:q1?settings.q1Color:"#EDF0EC",color:q1?"#fff":"#9AADA4"}}>
                {q1?"✓ 有":"無"}
              </button>
            </div>
            <textarea value={q1Notes} onChange={e=>setQ1Notes(e.target.value)}
              placeholder="備註（選填）"
              style={{width:"100%",marginTop:"12px",padding:"10px 12px",border:"1.5px solid #E0E8E4",borderRadius:"10px",
                fontSize:"14px",resize:"none",outline:"none",fontFamily:"inherit",
                color:"#2C3E35",background:"#FAFCFB",height:"68px",boxSizing:"border-box"}}/>
          </div>
          {activeParts.map((part,idx)=>{
            const color=settings.partColors[part.id];
            const label=part.isCustom?(settings.customLabel||"自訂部位"):part.zh;
            const syms=SYMS[part.id]||SYMS.custom;
            const pd=parts[part.id]||{};
            return(
              <div key={part.id} style={{background:"#fff",borderRadius:"14px",padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
                  <span style={{fontSize:"11px",fontWeight:"700",color:"#9AADA4",letterSpacing:"1px"}}>Q{idx+2}</span>
                  <div style={{width:"10px",height:"10px",borderRadius:"50%",background:color,flexShrink:0}}/>
                  <span style={{fontSize:"16px",fontWeight:"700",color:"#2C3E35"}}>{label}</span>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"12px"}}>
                  {syms.map(s=>{const on=(pd.symptoms||[]).includes(s);return(
                    <button key={s} onClick={()=>tSym(part.id,s)}
                      style={{padding:"5px 11px",borderRadius:"14px",border:on?"none":"1.5px solid #D8E4DC",
                        background:on?color:"transparent",color:on?"#fff":"#6B7A70",fontSize:"13px",fontWeight:on?"600":"400",cursor:"pointer"}}>
                      {s}
                    </button>
                  );})}
                </div>
                <div style={{display:"flex",gap:"6px",marginBottom:"12px"}}>
                  {[{k:"better",l:"↑ 好一些",bg:"#E8F5EE",tc:"#2D7A50"},{k:"same",l:"→ 差不多",bg:"#F0F3F8",tc:"#4A6FA5"},{k:"worse",l:"↓ 差一些",bg:"#FDEAEA",tc:"#C44040"}].map(t=>(
                    <button key={t.k} onClick={()=>tTrend(part.id,t.k)}
                      style={{flex:1,padding:"7px 2px",borderRadius:"8px",border:"none",cursor:"pointer",fontSize:"12px",fontWeight:"600",
                        background:pd.trend===t.k?t.bg:"#F5F7F4",color:pd.trend===t.k?t.tc:"#B0BDB7"}}>
                      {t.l}
                    </button>
                  ))}
                </div>
                <textarea value={pd.notes||""} onChange={e=>uNotes(part.id,e.target.value)}
                  placeholder="備註（選填）"
                  style={{width:"100%",padding:"10px 12px",border:"1.5px solid #E0E8E4",borderRadius:"10px",
                    fontSize:"14px",resize:"none",outline:"none",fontFamily:"inherit",
                    color:"#2C3E35",background:"#FAFCFB",height:"68px",boxSizing:"border-box"}}/>
              </div>
            );
          })}
          {activeParts.length===0&&(
            <div style={{padding:"24px",textAlign:"center",background:"#fff",borderRadius:"14px"}}>
              <div style={{fontSize:"28px",marginBottom:"8px"}}>⚙️</div>
              <div style={{color:"#9AADA4",fontSize:"14px"}}>尚未設定追蹤部位</div>
              <div style={{color:"#5A8C70",fontSize:"13px",marginTop:"4px",fontWeight:"600"}}>請到「設定」頁面選擇 →</div>
            </div>
          )}
          <button onClick={()=>onSave(dateKey,q1,q1Notes,parts)}
            style={{width:"100%",padding:"16px",background:"#3B7A57",border:"none",borderRadius:"14px",
              color:"#fff",fontSize:"16px",fontWeight:"700",cursor:"pointer",marginTop:"4px"}}>
            儲存記錄
          </button>
        </div>
      </div>
    </div>
  );
}

function SettingsContent({settings,onUpdate,profiles,curProfile,onSwitchProfile}){
  const toggle=id=>{
    const a=settings.activeParts;
    if(a.includes(id))onUpdate({...settings,activeParts:a.filter(x=>x!==id)});
    else if(a.length<5)onUpdate({...settings,activeParts:[...a,id]});
  };
  return(
    <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:"14px",paddingBottom:"80px"}}>
      <div>
        <div style={{fontSize:"11px",fontWeight:"700",color:"#9AADA4",letterSpacing:"1px",marginBottom:"8px"}}>Q1 主要追蹤項目</div>
        <div style={{background:"#fff",borderRadius:"14px",padding:"14px 16px"}}>
          <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
            <input value={settings.q1Label} onChange={e=>onUpdate({...settings,q1Label:e.target.value})}
              placeholder="例：吃藥、量血壓…"
              style={{flex:1,padding:"10px 12px",border:"1.5px solid #D8E4DC",borderRadius:"10px",fontSize:"15px",outline:"none",color:"#2C3E35"}}/>
            <div style={{position:"relative",flexShrink:0}}>
              <input type="color" value={settings.q1Color} onChange={e=>onUpdate({...settings,q1Color:e.target.value})}
                style={{opacity:0,position:"absolute",inset:0,width:"100%",height:"100%",cursor:"pointer"}}/>
              <div style={{width:"42px",height:"42px",borderRadius:"10px",background:settings.q1Color,border:"2px solid #E0E8E4"}}/>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
          <div style={{fontSize:"11px",fontWeight:"700",color:"#9AADA4",letterSpacing:"1px"}}>追蹤部位（最多 5 個）</div>
          <div style={{fontSize:"12px",fontWeight:"700",color:settings.activeParts.length>=5?"#D44040":"#9AADA4"}}>{settings.activeParts.length}/5</div>
        </div>
        <div style={{background:"#fff",borderRadius:"14px",padding:"4px 16px"}}>
          {PARTS.map((part,i)=>{
            const active=settings.activeParts.includes(part.id);
            const color=settings.partColors[part.id];
            return(
              <div key={part.id} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 0",
                borderBottom:i<PARTS.length-1?"1px solid #F0F5F2":"none"}}>
                <button onClick={()=>toggle(part.id)}
                  style={{width:"26px",height:"26px",borderRadius:"50%",flexShrink:0,cursor:"pointer",
                    border:active?"none":"2px solid #D0DAD4",background:active?color:"transparent",
                    display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {active&&<span style={{color:"#fff",fontSize:"11px",fontWeight:"700"}}>✓</span>}
                </button>
                <div style={{flex:1,minWidth:0}}>
                  {part.isCustom
                    ?<input value={settings.customLabel} onChange={e=>onUpdate({...settings,customLabel:e.target.value})}
                        placeholder="自訂部位名稱…"
                        style={{border:"none",outline:"none",fontSize:"15px",color:active?"#2C3E35":"#9AADA4",background:"transparent",width:"100%"}}/>
                    :<span style={{fontSize:"15px",color:active?"#2C3E35":"#9AADA4",fontWeight:active?"500":"400"}}>{part.zh}</span>
                  }
                </div>
                <div style={{position:"relative",flexShrink:0}}>
                  <input type="color" value={color} onChange={e=>onUpdate({...settings,partColors:{...settings.partColors,[part.id]:e.target.value}})}
                    style={{opacity:0,position:"absolute",inset:0,width:"100%",height:"100%",cursor:"pointer"}}/>
                  <div style={{width:"28px",height:"28px",borderRadius:"8px",background:color,border:"1.5px solid #E0E8E4"}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div>
        <div style={{fontSize:"11px",fontWeight:"700",color:"#9AADA4",letterSpacing:"1px",marginBottom:"8px"}}>使用者管理</div>
        <div style={{background:"#fff",borderRadius:"14px",overflow:"hidden"}}>
          {profiles.map((p,i)=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 16px",
              background:p.id===curProfile?.id?"#F2FAF5":"transparent",
              borderBottom:i<profiles.length-1?"1px solid #F0F5F2":"none"}}>
              <div style={{width:"32px",height:"32px",borderRadius:"50%",background:p.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:"700",fontSize:"14px"}}>{p.name[0]}</div>
              <span style={{flex:1,fontSize:"15px",fontWeight:p.id===curProfile?.id?"600":"400",color:"#2C3E35"}}>{p.name}</span>
              {p.id===curProfile?.id
                ?<span style={{fontSize:"12px",color:"#5A8C70",fontWeight:"600"}}>使用中</span>
                :<button onClick={()=>onSwitchProfile(p.id)}
                    style={{padding:"5px 12px",borderRadius:"12px",border:"1.5px solid #D8E4DC",background:"transparent",fontSize:"12px",color:"#5A8C70",cursor:"pointer",fontWeight:"600"}}>切換</button>
              }
            </div>
          ))}
          <button onClick={()=>onSwitchProfile(null)}
            style={{width:"100%",padding:"12px 16px",border:"none",background:"transparent",textAlign:"left",color:"#7A8C82",fontSize:"14px",cursor:"pointer"}}>
            ＋ 新增使用者
          </button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const[profiles,setProfiles]=useState(()=>LS.get("hd_profiles",[]));
  const[curPid,setCurPid]=useState(()=>LS.get("hd_current",null));
  const[pData,setPData]=useState(()=>{const pid=LS.get("hd_current",null);return pid?LS.get(`hd_${pid}`,{settings:mkSet(),records:{}}):{settings:mkSet(),records:{}};});
  const[screen,setScreen]=useState(()=>LS.get("hd_current",null)?"calendar":"profiles");
  const[month,setMonth]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()};});
  const[selDate,setSelDate]=useState(null);
  const[filter,setFilter]=useState(null);
  const[addProf,setAddProf]=useState(false);
  const[newName,setNewName]=useState("");
  const[newColor,setNewColor]=useState(AC[0]);
  const[toast,setToast]=useState("");
  const[showPicker,setShowPicker]=useState(false);
  const[pickerYear,setPickerYear]=useState(month.y);

  const settings=pData.settings||mkSet();
  const records=pData.records||{};

  useEffect(()=>{LS.set("hd_profiles",profiles);},[profiles]);
  useEffect(()=>{LS.set("hd_current",curPid);},[curPid]);
  useEffect(()=>{if(curPid)LS.set(`hd_${curPid}`,pData);},[curPid,pData]);

  const activeParts=useMemo(()=>settings.activeParts.map(id=>PARTS.find(p=>p.id===id)).filter(Boolean),[settings.activeParts]);

  const getTagsForDay=key=>{
    const rec=records[key];if(!rec)return[];
    const tags=[];
    if(rec.q1)tags.push({id:"q1",color:settings.q1Color});
    activeParts.forEach(p=>{const pd=rec.parts?.[p.id];if(pd?.symptoms?.length||pd?.notes?.trim())tags.push({id:p.id,color:settings.partColors[p.id]});});
    return tags;
  };

  const isFiltered=key=>{
    if(!filter)return true;
    const rec=records[key];if(!rec)return false;
    if(filter==="q1")return!!rec.q1;
    const pd=rec.parts?.[filter];return!!(pd?.symptoms?.length||pd?.notes?.trim());
  };

  const selectProfile=pid=>{
    const data=LS.get(`hd_${pid}`,{settings:mkSet(),records:{}});
    setCurPid(pid);setPData(data);setScreen("calendar");setFilter(null);
  };

  const createProfile=()=>{
    if(!newName.trim())return;
    const p={id:uid(),name:newName.trim(),color:newColor};
    const updated=[...profiles,p];
    setProfiles(updated);LS.set("hd_profiles",updated);
    LS.set(`hd_${p.id}`,{settings:mkSet(),records:{}});
    selectProfile(p.id);setAddProf(false);setNewName("");
    setNewColor(AC[updated.length%AC.length]);
  };

  const saveRecord=(dateKey,q1Val,q1NotesVal,partsVal)=>{
    setPData(d=>{
      const old=d.records[dateKey];const now=new Date().toISOString();
      return{...d,records:{...d.records,[dateKey]:{createdAt:old?.createdAt||now,updatedAt:now,q1:q1Val,q1Notes:q1NotesVal,parts:partsVal}}};
    });
    setSelDate(null);setToast("已儲存 ✓");setTimeout(()=>setToast(""),2000);
  };

  const todayK=dk(new Date());
  const firstDay=new Date(month.y,month.m,1).getDay();
  const daysInMonth=new Date(month.y,month.m+1,0).getDate();
  const curProfile=profiles.find(p=>p.id===curPid);

  if(screen==="profiles"){
    return(
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",background:"#F2F5F1"}}>
        <div style={{textAlign:"center",marginBottom:"32px"}}>
          <div style={{fontSize:"48px",marginBottom:"8px"}}>🌿</div>
          <h1 style={{fontSize:"22px",fontWeight:"700",color:"#2C3E35",margin:"0 0 4px"}}>健康日記</h1>
          <p style={{color:"#9AADA4",fontSize:"14px"}}>選擇使用者</p>
        </div>
        <div style={{width:"100%",maxWidth:"360px",display:"flex",flexDirection:"column",gap:"10px"}}>
          {profiles.map(p=>(
            <button key={p.id} onClick={()=>selectProfile(p.id)}
              style={{display:"flex",alignItems:"center",gap:"14px",padding:"14px 18px",background:"#fff",border:"none",borderRadius:"16px",cursor:"pointer",boxShadow:"0 2px 10px rgba(0,0,0,0.07)",textAlign:"left"}}>
              <div style={{width:"44px",height:"44px",borderRadius:"50%",background:p.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:"700",fontSize:"18px",flexShrink:0}}>{p.name[0]}</div>
              <span style={{fontSize:"16px",fontWeight:"600",color:"#2C3E35",flex:1}}>{p.name}</span>
              <span style={{color:"#B0BDB7",fontSize:"20px"}}>›</span>
            </button>
          ))}
          {addProf?(
            <div style={{background:"#fff",borderRadius:"16px",padding:"18px",boxShadow:"0 2px 10px rgba(0,0,0,0.07)"}}>
              <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createProfile()}
                placeholder="輸入名稱" autoFocus
                style={{width:"100%",padding:"11px 14px",border:"1.5px solid #D0DDD6",borderRadius:"10px",fontSize:"15px",outline:"none",marginBottom:"12px"}}/>
              <div style={{display:"flex",gap:"8px",marginBottom:"14px"}}>
                {AC.map(c=>(
                  <div key={c} onClick={()=>setNewColor(c)}
                    style={{width:"28px",height:"28px",borderRadius:"50%",background:c,cursor:"pointer",
                      outline:c===newColor?"3px solid #2C3E35":"none",outlineOffset:"2px"}}/>
                ))}
              </div>
              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>{setAddProf(false);setNewName("");}}
                  style={{flex:1,padding:"11px",background:"#F2F5F1",border:"none",borderRadius:"10px",cursor:"pointer",fontSize:"14px",color:"#7A8C82"}}>取消</button>
                <button onClick={createProfile}
                  style={{flex:2,padding:"11px",background:"#3B7A57",border:"none",borderRadius:"10px",cursor:"pointer",fontSize:"15px",color:"#fff",fontWeight:"700"}}>建立</button>
              </div>
            </div>
          ):(
            <button onClick={()=>setAddProf(true)}
              style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",padding:"14px",background:"transparent",border:"2px dashed #C0D0C8",borderRadius:"16px",cursor:"pointer",color:"#7A8C82",fontSize:"15px"}}>
              ＋ 新增使用者
            </button>
          )}
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",paddingTop:"110px",paddingBottom:"72px",background:"#F2F5F1"}}>
      {/* Fixed Header */}
      <div style={{position:"fixed",top:0,left:0,right:0,background:"#fff",padding:"14px 16px 10px",borderBottom:"1px solid #E5EDE7",zIndex:50}}>
        {screen==="calendar"&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <div onClick={()=>setScreen("profiles")}
                style={{width:"32px",height:"32px",borderRadius:"50%",background:curProfile?.color||"#3B7A57",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:"700",fontSize:"14px",cursor:"pointer",flexShrink:0}}>
                {curProfile?.name?.[0]||"?"}
              </div>
              <div style={{display:"flex",alignItems:"center"}}>
                <button onClick={()=>setMonth(m=>{const d=new Date(m.y,m.m-1);return{y:d.getFullYear(),m:d.getMonth()};})}
                  style={{background:"none",border:"none",cursor:"pointer",fontSize:"22px",color:"#7A8C82",padding:"0 4px",lineHeight:1}}>‹</button>
                <span onClick={()=>{setPickerYear(month.y);setShowPicker(true);}}
                  style={{fontSize:"17px",fontWeight:"700",color:"#2C3E35",minWidth:"100px",textAlign:"center",cursor:"pointer",userSelect:"none"}}>
                  {month.y}年 {month.m+1}月
                </span>
                <button onClick={()=>setMonth(m=>{const d=new Date(m.y,m.m+1);return{y:d.getFullYear(),m:d.getMonth()};})}
                  style={{background:"none",border:"none",cursor:"pointer",fontSize:"22px",color:"#7A8C82",padding:"0 4px",lineHeight:1}}>›</button>
              </div>
            </div>
            <button onClick={()=>{const n=new Date();setMonth({y:n.getFullYear(),m:n.getMonth()});setSelDate(dk(n));}}
              style={{padding:"5px 12px",background:"#3B7A57",border:"none",borderRadius:"16px",color:"#fff",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>今天</button>
          </div>
          <div style={{display:"flex",gap:"6px",overflowX:"auto",paddingBottom:"2px"}}>
            {[{id:null,label:"全部",color:null},{id:"q1",label:settings.q1Label,color:settings.q1Color},
              ...activeParts.map(p=>({id:p.id,label:p.isCustom?(settings.customLabel||"自訂"):p.zh,color:settings.partColors[p.id]}))
            ].map(f=>(
              <button key={String(f.id)} onClick={()=>setFilter(filter===f.id?null:f.id)}
                style={{padding:"4px 12px",borderRadius:"16px",border:"none",flexShrink:0,cursor:"pointer",fontSize:"12px",fontWeight:"600",whiteSpace:"nowrap",
                  background:filter===f.id?(f.color||"#2C3E35"):"#F0F5F2",
                  color:filter===f.id?"#fff":"#7A8C82"}}>
                {f.label}
              </button>
            ))}
          </div>
        </>)}
        {screen==="settings"&&(
          <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
            <div style={{width:"32px",height:"32px",borderRadius:"50%",background:curProfile?.color||"#3B7A57",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:"700",fontSize:"14px"}}>{curProfile?.name?.[0]||"?"}</div>
            <span style={{fontSize:"17px",fontWeight:"700",color:"#2C3E35"}}>{curProfile?.name||""} 的設定</span>
          </div>
        )}
      </div>

      {/* Calendar */}
      {screen==="calendar"&&(
        <div style={{padding:"12px 10px 0"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:"4px"}}>
            {WD.map((d,i)=>(
              <div key={d} style={{textAlign:"center",fontSize:"12px",fontWeight:"600",padding:"4px 0",
                color:i===0?"#D44040":i===6?"#4A87C8":"#9AADA4"}}>{d}</div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px"}}>
            {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}/>)}
            {Array.from({length:daysInMonth}).map((_,i)=>{
              const day=i+1;
              const dateKey=`${month.y}-${String(month.m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const isToday=dateKey===todayK;
              const isPast=dateKey<todayK;
              const rec=records[dateKey];
              const tags=getTagsForDay(dateKey);
              const dimmed=!!filter&&!isFiltered(dateKey);
              const noRecord=!rec&&isPast;
              return(
                <button key={day} onClick={()=>setSelDate(dateKey)}
                  style={{aspectRatio:"1",borderRadius:"10px",cursor:"pointer",
                    border:noRecord?"1.5px dashed #C8D4CE":"none",
                    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"3px",padding:"2px",
                    background:isToday?"#EAF5EE":"transparent",
                    outline:isToday?"2px solid #3B7A57":"none",outlineOffset:"1px",
                    opacity:dimmed?0.2:1}}>
                  <span style={{fontSize:"14px",fontWeight:isToday?"800":"400",lineHeight:1,
                    color:noRecord?"#C8D4CE":isToday?"#3B7A57":"#2C3E35"}}>
                    {day}
                  </span>
                  <div style={{display:"flex",gap:"3px",flexWrap:"wrap",justifyContent:"center",minHeight:"10px"}}>
                    {tags.slice(0,5).map(t=>(
                      <div key={t.id} style={{width:"8px",height:"8px",borderRadius:"50%",background:t.color}}/>
                    ))}
                  </div>
                </button>
              );
            })}
          </div>
          <div style={{marginTop:"14px",padding:"12px 14px",background:"#fff",borderRadius:"14px",marginBottom:"16px"}}>
            <div style={{fontSize:"11px",fontWeight:"700",color:"#9AADA4",letterSpacing:"1px",marginBottom:"8px"}}>圖例</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"10px 14px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
                <div style={{width:"9px",height:"9px",borderRadius:"50%",background:settings.q1Color}}/>
                <span style={{fontSize:"12px",color:"#6B7A70"}}>{settings.q1Label}</span>
              </div>
              {activeParts.map(p=>(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:"5px"}}>
                  <div style={{width:"9px",height:"9px",borderRadius:"50%",background:settings.partColors[p.id]}}/>
                  <span style={{fontSize:"12px",color:"#6B7A70"}}>{p.isCustom?(settings.customLabel||"自訂"):p.zh}</span>
                </div>
              ))}
              <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
                <div style={{width:"12px",height:"9px",borderRadius:"2px",border:"1.5px dashed #C8D4CE"}}/>
                <span style={{fontSize:"12px",color:"#B0BDB7"}}>未記錄</span>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Settings */}
      {screen==="settings"&&(
        <SettingsContent
          settings={settings}
          onUpdate={s=>setPData(d=>({...d,settings:s}))}
          profiles={profiles}
          curProfile={curProfile}
          onSwitchProfile={pid=>{
            if(!pid){setAddProf(true);setScreen("profiles");return;}
            selectProfile(pid);
          }}
        />
      )}

      {/* Fixed Bottom Tabs */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",display:"flex",borderTop:"1px solid #E5EDE7",zIndex:50}}>
        {[{id:"calendar",label:"日曆",icon:"📅"},{id:"settings",label:"設定",icon:"⚙️"}].map(tab=>(
          <button key={tab.id} onClick={()=>setScreen(tab.id)}
            style={{flex:1,padding:"12px 0 10px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}}>
            <span style={{fontSize:"20px",lineHeight:1}}>{tab.icon}</span>
            <span style={{fontSize:"11px",fontWeight:screen===tab.id?"700":"400",color:screen===tab.id?"#3B7A57":"#9AADA4"}}>{tab.label}</span>
          </button>
        ))}
      </div>

      {/* Record Modal */}
      {selDate&&(
        <RecordModal
          dateKey={selDate}
          record={records[selDate]}
          settings={settings}
          activeParts={activeParts}
          onClose={()=>setSelDate(null)}
          onSave={saveRecord}
        />
      )}

      {/* Month/Year Picker */}
      {showPicker&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",zIndex:90,display:"flex",alignItems:"flex-end"}}
          onClick={e=>{if(e.target===e.currentTarget)setShowPicker(false);}}>
          <div style={{width:"100%",background:"#F2F5F1",borderRadius:"20px 20px 0 0",padding:"16px 16px 32px"}}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:"14px"}}>
              <div style={{width:"36px",height:"4px",borderRadius:"2px",background:"#C8D4CE"}}/>
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px",padding:"0 8px"}}>
              <button onClick={()=>setPickerYear(y=>y-1)}
                style={{background:"none",border:"none",cursor:"pointer",fontSize:"24px",color:"#7A8C82",padding:"4px 12px",lineHeight:1}}>‹</button>
              <span style={{fontSize:"20px",fontWeight:"700",color:"#2C3E35"}}>{pickerYear}年</span>
              <button onClick={()=>setPickerYear(y=>y+1)}
                style={{background:"none",border:"none",cursor:"pointer",fontSize:"24px",color:"#7A8C82",padding:"4px 12px",lineHeight:1}}>›</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px",marginBottom:"14px"}}>
              {Array.from({length:12}).map((_,i)=>{
                const isSel=month.y===pickerYear&&month.m===i;
                return(
                  <button key={i} onClick={()=>{setMonth({y:pickerYear,m:i});setShowPicker(false);}}
                    style={{padding:"13px 4px",borderRadius:"12px",border:"none",cursor:"pointer",fontSize:"15px",fontWeight:isSel?"700":"400",
                      background:isSel?"#3B7A57":"#fff",color:isSel?"#fff":"#2C3E35"}}>
                    {i+1}月
                  </button>
                );
              })}
            </div>
            <button onClick={()=>setShowPicker(false)}
              style={{width:"100%",padding:"13px",background:"#EDF0EC",border:"none",borderRadius:"12px",cursor:"pointer",fontSize:"15px",color:"#7A8C82",fontWeight:"600"}}>
              取消
            </button>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",top:"20px",left:"50%",transform:"translateX(-50%)",background:"#2C3E35",color:"#fff",padding:"10px 20px",borderRadius:"20px",fontSize:"14px",fontWeight:"600",zIndex:200,pointerEvents:"none"}}>
          {toast}
        </div>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
